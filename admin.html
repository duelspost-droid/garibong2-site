<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>공지사항 관리 — 가리봉2구역재개발정비사업조합</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f1f5f9; color: #1e293b; }
    a { text-decoration: none; color: inherit; }

    /* 로그인 */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0d2461, #1e40af);
    }
    .login-box {
      background: #fff; border-radius: 16px; padding: 48px 40px;
      width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.2);
      text-align: center;
    }
    .login-box h1 { font-size: 20px; font-weight: 800; color: #0d2461; margin-bottom: 6px; }
    .login-box p  { font-size: 13px; color: #94a3b8; margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 13px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 15px; outline: none; margin-bottom: 14px; transition: border .2s;
    }
    .login-box input:focus { border-color: #2563eb; }
    .login-box button {
      width: 100%; padding: 14px; background: #0d2461; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background .2s;
    }
    .login-box button:hover { background: #2563eb; }
    .login-err { color: #ef4444; font-size: 13px; margin-top: 10px; }

    /* 관리자 패널 */
    .admin-wrap { display: none; min-height: 100vh; }
    .admin-header {
      background: #0d2461; color: #fff; padding: 0 28px;
      display: flex; align-items: center; justify-content: space-between; height: 60px;
    }
    .admin-header h1 { font-size: 16px; font-weight: 700; }
    .admin-header .head-right { display: flex; align-items: center; gap: 16px; }
    .admin-header a { color: #93c5fd; font-size: 13px; }
    .btn-logout {
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      color: #fff; padding: 7px 14px; border-radius: 7px; font-size: 13px; cursor: pointer;
    }
    .admin-body { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

    /* 폼 카드 */
    .form-card {
      background: #fff; border-radius: 14px; padding: 28px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-bottom: 28px;
    }
    .form-card h2 { font-size: 16px; font-weight: 800; color: #0d2461; margin-bottom: 20px; }
    .form-row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
    .form-row label { font-size: 13px; font-weight: 600; color: #475569; display: block; margin-bottom: 5px; }
    .form-row .field { flex: 1; min-width: 160px; }
    select, input[type="text"], textarea {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 9px;
      font-size: 14px; font-family: inherit; outline: none; transition: border .2s; background: #f8fafc;
    }
    select:focus, input[type="text"]:focus, textarea:focus { border-color: #2563eb; background: #fff; }
    textarea { resize: vertical; min-height: 70px; }
    .btn-add {
      background: #0d2461; color: #fff; border: none; border-radius: 9px;
      padding: 12px 28px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background .2s;
    }
    .btn-add:hover { background: #2563eb; }
    .btn-add:disabled { background: #94a3b8; cursor: not-allowed; }

    /* 공지 목록 */
    .list-card {
      background: #fff; border-radius: 14px; padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .list-head {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
    }
    .list-head h2 { font-size: 16px; font-weight: 800; color: #0d2461; }
    .list-count { font-size: 12px; color: #94a3b8; }

    .notice-item {
      display: flex; align-items: flex-start; gap: 14px; padding: 16px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .notice-item:last-child { border-bottom: none; }
    .nbadge {
      flex-shrink: 0; font-size: 11px; font-weight: 700; padding: 3px 9px;
      border-radius: 6px; margin-top: 2px;
    }
    .nbadge-new    { background: #fef3c7; color: #d97706; }
    .nbadge-notice { background: #eff6ff; color: #2563eb; }
    .nbadge-guide  { background: #f0fdf4; color: #16a34a; }
    .notice-body { flex: 1; }
    .notice-body strong { font-size: 15px; color: #1e293b; display: block; margin-bottom: 3px; }
    .notice-body span   { font-size: 13px; color: #94a3b8; }
    .notice-body p      { font-size: 13px; color: #475569; margin-top: 4px; }
    .notice-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-edit {
      background: #f1f5f9; color: #475569; border: none; border-radius: 7px;
      padding: 6px 12px; font-size: 12px; cursor: pointer; transition: background .15s;
    }
    .btn-edit:hover { background: #e2e8f0; }
    .btn-del {
      background: #fef2f2; color: #ef4444; border: none; border-radius: 7px;
      padding: 6px 12px; font-size: 12px; cursor: pointer; transition: background .15s;
    }
    .btn-del:hover { background: #fee2e2; }

    .empty { text-align: center; padding: 40px; color: #94a3b8; font-size: 14px; }
    .loading { text-align: center; padding: 30px; color: #94a3b8; }

    /* 토스트 */
    .toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 999;
      background: #0d2461; color: #fff; padding: 14px 22px; border-radius: 10px;
      font-size: 14px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,.2);
      transform: translateY(80px); opacity: 0; transition: all .3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.err  { background: #ef4444; }

    /* 수정 모달 */
    .modal-bg {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #fff; border-radius: 16px; padding: 32px; width: 100%; max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal h3 { font-size: 17px; font-weight: 800; color: #0d2461; margin-bottom: 20px; }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel {
      background: #f1f5f9; color: #475569; border: none; border-radius: 9px;
      padding: 11px 22px; font-size: 14px; cursor: pointer;
    }
    .btn-save {
      background: #0d2461; color: #fff; border: none; border-radius: 9px;
      padding: 11px 22px; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .btn-save:hover { background: #2563eb; }

    /* config 알림 */
    .config-alert {
      background: #fef3c7; border: 1px solid #fcd34d; border-radius: 12px;
      padding: 16px 20px; margin-bottom: 24px; font-size: 14px; color: #92400e;
      display: none;
    }
    .config-alert.show { display: block; }
    .config-alert strong { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>⚙️ 관리자 로그인</h1>
    <p>가리봉2구역재개발정비사업조합</p>
    <input type="email" id="loginEmail" placeholder="이메일" autocomplete="username"/>
    <input type="password" id="loginPw" placeholder="비밀번호" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') doLogin()"/>
    <button onclick="doLogin()">로그인</button>
    <p class="login-err" id="loginErr"></p>
  </div>
</div>

<!-- 관리자 패널 -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-header">
    <h1>📋 공지사항 관리</h1>
    <div class="head-right">
      <a href="index.html" target="_blank">← 홈페이지 보기</a>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="admin-body">
    <div class="config-alert" id="configAlert">
      <strong>⚠️ Firebase 설정이 필요합니다</strong>
      admin.html 하단의 firebaseConfig 값을 Firebase 콘솔에서 발급받아 입력해 주세요.
    </div>

    <!-- 공지 추가 폼 -->
    <div class="form-card">
      <h2>+ 새 공지 등록</h2>
      <div class="form-row">
        <div class="field">
          <label>분류</label>
          <select id="newBadge">
            <option value="new">NEW</option>
            <option value="notice">공지</option>
            <option value="guide">안내</option>
          </select>
        </div>
        <div class="field" style="flex:3">
          <label>제목</label>
          <input type="text" id="newTitle" placeholder="공지 제목을 입력하세요"/>
        </div>
      </div>
      <div class="form-row">
        <div class="field" style="flex:1">
          <label>부제목 (선택)</label>
          <input type="text" id="newSub" placeholder="예) 일시: 2026년 ○월 ○일"/>
        </div>
      </div>
      <button class="btn-add" id="btnAdd" onclick="addNotice()">등록하기</button>
    </div>

    <!-- 공지 목록 -->
    <div class="list-card">
      <div class="list-head">
        <h2>공지 목록</h2>
        <span class="list-count" id="listCount">불러오는 중...</span>
      </div>
      <div id="noticeList"><div class="loading">⏳ 불러오는 중...</div></div>
    </div>
  </div>
</div>

<!-- 수정 모달 -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3>✏️ 공지 수정</h3>
    <input type="hidden" id="editId"/>
    <div class="form-row">
      <div class="field">
        <label>분류</label>
        <select id="editBadge">
          <option value="new">NEW</option>
          <option value="notice">공지</option>
          <option value="guide">안내</option>
        </select>
      </div>
      <div class="field" style="flex:3">
        <label>제목</label>
        <input type="text" id="editTitle"/>
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>부제목</label>
        <input type="text" id="editSub"/>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ════════════════════════════════════════════════
  Firebase SDK
════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp }              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
                                        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, orderBy, query, serverTimestamp }
                                        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── Firebase 설정 ── (Firebase 콘솔에서 발급받아 여기에 입력)
  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_AUTH_DOMAIN",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };
  // ──────────────────────────────────────────────

  const isConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY";

  let app, auth, db;
  if (isConfigured) {
    app  = initializeApp(firebaseConfig);
    auth = getAuth(app);
    db   = getFirestore(app);
  } else {
    document.getElementById('configAlert').classList.add('show');
  }

  // 날짜 포맷
  const today = () => new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\. /g,'.').replace('.','.');

  // 배지 라벨
  const badgeLabel = { new:'NEW', notice:'공지', guide:'안내' };
  const badgeClass = { new:'nbadge-new', notice:'nbadge-notice', guide:'nbadge-guide' };

  // 토스트
  window.showToast = (msg, err=false) => {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show' + (err?' err':'');
    setTimeout(() => t.className = 'toast', 2800);
  };

  // ── 인증 ──────────────────────────────────────
  window.doLogin = async () => {
    if (!isConfigured) { showToast('Firebase 설정을 먼저 완료해주세요', true); return; }
    const email = document.getElementById('loginEmail').value.trim();
    const pw    = document.getElementById('loginPw').value;
    try {
      await signInWithEmailAndPassword(auth, email, pw);
    } catch(e) {
      document.getElementById('loginErr').textContent = '이메일 또는 비밀번호가 틀렸습니다.';
    }
  };
  window.doLogout = async () => { await signOut(auth); };

  if (isConfigured) {
    onAuthStateChanged(auth, user => {
      document.getElementById('loginWrap').style.display  = user ? 'none' : 'flex';
      document.getElementById('adminWrap').style.display  = user ? 'block' : 'none';
      if (user) loadNotices();
    });
  }

  // ── 공지 목록 로드 ─────────────────────────────
  async function loadNotices() {
    if (!db) return;
    const q = query(collection(db, 'notices'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    const list = document.getElementById('noticeList');
    const count = document.getElementById('listCount');
    if (snap.empty) {
      list.innerHTML = '<div class="empty">등록된 공지가 없습니다.</div>';
      count.textContent = '0건'; return;
    }
    count.textContent = snap.size + '건';
    list.innerHTML = '';
    snap.forEach(d => {
      const n = d.data();
      list.innerHTML += `
        <div class="notice-item" id="item-${d.id}">
          <span class="nbadge ${badgeClass[n.badge]||'nbadge-notice'}">${badgeLabel[n.badge]||n.badge}</span>
          <div class="notice-body">
            <strong>${n.title}</strong>
            <span>${n.date}</span>
            ${n.sub ? `<p>${n.sub}</p>` : ''}
          </div>
          <div class="notice-actions">
            <button class="btn-edit" onclick="openEdit('${d.id}','${n.badge}',\`${n.title}\`,\`${n.sub||''}\`)">수정</button>
            <button class="btn-del"  onclick="delNotice('${d.id}')">삭제</button>
          </div>
        </div>`;
    });
  }

  // ── 공지 추가 ─────────────────────────────────
  window.addNotice = async () => {
    if (!db) { showToast('Firebase 설정 필요', true); return; }
    const title = document.getElementById('newTitle').value.trim();
    if (!title) { showToast('제목을 입력해주세요', true); return; }
    const btn = document.getElementById('btnAdd');
    btn.disabled = true; btn.textContent = '등록 중...';
    try {
      await addDoc(collection(db, 'notices'), {
        badge: document.getElementById('newBadge').value,
        title,
        sub:   document.getElementById('newSub').value.trim(),
        date:  today(),
        createdAt: serverTimestamp()
      });
      document.getElementById('newTitle').value = '';
      document.getElementById('newSub').value   = '';
      showToast('✅ 공지가 등록되었습니다');
      loadNotices();
    } catch(e) { showToast('오류: ' + e.message, true); }
    btn.disabled = false; btn.textContent = '등록하기';
  };

  // ── 공지 삭제 ─────────────────────────────────
  window.delNotice = async (id) => {
    if (!confirm('이 공지를 삭제할까요?')) return;
    await deleteDoc(doc(db, 'notices', id));
    showToast('🗑️ 삭제되었습니다');
    loadNotices();
  };

  // ── 공지 수정 ─────────────────────────────────
  window.openEdit = (id, badge, title, sub) => {
    document.getElementById('editId').value    = id;
    document.getElementById('editBadge').value = badge;
    document.getElementById('editTitle').value = title;
    document.getElementById('editSub').value   = sub;
    document.getElementById('editModal').classList.add('open');
  };
  window.closeModal = () => document.getElementById('editModal').classList.remove('open');
  window.saveEdit   = async () => {
    const id    = document.getElementById('editId').value;
    const title = document.getElementById('editTitle').value.trim();
    if (!title) { showToast('제목을 입력해주세요', true); return; }
    await updateDoc(doc(db, 'notices', id), {
      badge: document.getElementById('editBadge').value,
      title,
      sub:   document.getElementById('editSub').value.trim()
    });
    closeModal();
    showToast('✅ 수정되었습니다');
    loadNotices();
  };
</script>
</body>
</html>
