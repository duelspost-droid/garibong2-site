<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>관리자 잠금 해제</title>
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; background: #0d2461; color: #fff;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #fff; color: #1e293b; border-radius: 16px; padding: 40px;
           max-width: 420px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    h1 { font-size: 22px; color: #0d2461; margin: 0 0 16px; }
    .ok { font-size: 48px; margin-bottom: 12px; }
    p { font-size: 14px; line-height: 1.7; color: #475569; }
    .pw { background: #f1f5f9; border-radius: 8px; padding: 12px; margin: 16px 0;
          font-size: 15px; font-weight: 700; color: #0d2461; }
    a.btn { display: inline-block; margin-top: 14px; background: #0d2461; color: #fff;
            text-decoration: none; padding: 12px 28px; border-radius: 9px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="box">
    <div class="ok">✅</div>
    <h1>잠금이 해제되었습니다</h1>
    <p>로그인 시도 횟수와 잠금이 초기화되었습니다.<br>이제 다시 로그인할 수 있습니다.</p>
    <div class="pw" id="pwInfo">현재 비밀번호 확인 중...</div>
    <p style="font-size:12px; color:#94a3b8;">※ 이 페이지는 본인만 사용하세요.</p>
    <a class="btn" href="gb2r-manage-7x9k.html">관리자페이지로 이동 →</a>
  </div>
  <script>
    // 잠금/시도 횟수 초기화
    localStorage.removeItem('login_attempts');
    localStorage.removeItem('lock_until');
    // 현재 비밀번호 안내 (변경했다면 그 값, 아니면 기본값)
    var pw = localStorage.getItem('admin_pw') || 'garibong2024!';
    document.getElementById('pwInfo').textContent = '현재 비밀번호: ' + pw;
  </script>
</body>
</html>
