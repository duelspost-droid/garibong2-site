<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>공지사항 관리 — 가리봉2구역재개발정비사업조합</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f1f5f9; color: #1e293b; }

    /* ── 로그인 ── */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0d2461 0%, #1e40af 100%);
    }
    .login-box {
      background: #fff; border-radius: 20px; padding: 52px 44px;
      width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,.22); text-align: center;
    }
    .login-logo { font-size: 40px; margin-bottom: 14px; }
    .login-box h1 { font-size: 19px; font-weight: 900; color: #0d2461; margin-bottom: 4px; }
    .login-box p  { font-size: 12px; color: #94a3b8; margin-bottom: 32px; }
    .input-group { margin-bottom: 14px; text-align: left; }
    .input-group label { font-size: 12px; font-weight: 600; color: #475569; display: block; margin-bottom: 5px; }
    .input-group input {
      width: 100%; padding: 13px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 14px; outline: none; transition: border .2s; background: #f8fafc;
    }
    .input-group input:focus { border-color: #2563eb; background: #fff; }
    .input-hint { font-size: 11px; color: #94a3b8; margin-top: 5px; line-height: 1.5; }
    .btn-login {
      width: 100%; padding: 14px; background: #0d2461; color: #fff; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px;
      transition: background .2s;
    }
    .btn-login:hover { background: #2563eb; }
    .login-err { color: #ef4444; font-size: 12px; margin-top: 10px; }

    /* ── 관리자 패널 ── */
    .admin-wrap { display: none; min-height: 100vh; }
    .admin-header {
      background: #0d2461; padding: 0 28px;
      display: flex; align-items: center; justify-content: space-between; height: 62px;
      position: sticky; top: 0; z-index: 10;
    }
    .admin-header-left { display: flex; align-items: center; gap: 14px; }
    .admin-header h1 { font-size: 15px; font-weight: 700; color: #fff; }
    .admin-header .user-chip {
      background: rgba(255,255,255,.1); color: #93c5fd;
      font-size: 12px; padding: 4px 10px; border-radius: 20px;
    }
    .head-right { display: flex; align-items: center; gap: 12px; }
    .head-right a { color: #93c5fd; font-size: 13px; transition: color .15s; }
    .head-right a:hover { color: #fff; }
    .btn-logout {
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18);
      color: #fff; padding: 7px 14px; border-radius: 7px; font-size: 12px;
      cursor: pointer; transition: background .15s;
    }
    .btn-logout:hover { background: rgba(255,255,255,.16); }

    .admin-body { max-width: 860px; margin: 0 auto; padding: 32px 20px; }

    /* ── 폼 카드 ── */
    .card {
      background: #fff; border-radius: 16px; padding: 28px;
      box-shadow: 0 2px 16px rgba(0,0,0,.06); margin-bottom: 24px;
      border: 1px solid #f1f5f9;
    }
    .card-title {
      font-size: 15px; font-weight: 800; color: #0d2461;
      margin-bottom: 22px; display: flex; align-items: center; gap: 8px;
    }
    .form-row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
    .field { flex: 1; min-width: 140px; }
    .field label { font-size: 12px; font-weight: 600; color: #475569; display: block; margin-bottom: 5px; }
    .ftextarea { min-height: 120px; resize: vertical; line-height: 1.7; }
    select, .finput {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 9px;
      font-size: 14px; font-family: inherit; outline: none; transition: border .2s; background: #f8fafc;
    }
    select:focus, .finput:focus { border-color: #2563eb; background: #fff; }
    .btn-submit {
      background: #0d2461; color: #fff; border: none; border-radius: 9px;
      padding: 12px 28px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background .2s;
    }
    .btn-submit:hover { background: #2563eb; }
    .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }
    .btn-small {
      background: #0d2461; color: #fff; border: none; border-radius: 8px;
      padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .2s;
    }
    .btn-small:hover { background: #2563eb; }

    /* ── 목록 ── */
    .list-head {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;
    }
    .list-count { font-size: 13px; color: #94a3b8; }
    .notice-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px 0; border-bottom: 1px solid #f1f5f9;
      transition: background .15s;
    }
    .notice-item:last-child { border-bottom: none; }
    .nbadge {
      flex-shrink: 0; font-size: 11px; font-weight: 700;
      padding: 3px 9px; border-radius: 6px; margin-top: 2px;
    }
    .b-new    { background: #fef3c7; color: #d97706; }
    .b-notice { background: #eff6ff; color: #2563eb; }
    .b-guide  { background: #f0fdf4; color: #16a34a; }
    .notice-body { flex: 1; min-width: 0; }
    .notice-body strong        { font-size: 14px; color: #1e293b; display: block; margin-bottom: 3px; }
    .notice-body small         { font-size: 12px; color: #94a3b8; }
    .notice-body .sub-text     { font-size: 13px; color: #475569; margin-top: 4px; }
    .notice-body .content-preview { font-size: 12px; color: #94a3b8; margin-top: 4px; line-height: 1.5; }
    .notice-body .content-missing { font-size: 12px; color: #f59e0b; margin-top: 4px; }
    .item-actions { display: flex; gap: 7px; flex-shrink: 0; }
    .btn-e {
      background: #f1f5f9; color: #475569; border: none; border-radius: 7px;
      padding: 6px 12px; font-size: 12px; cursor: pointer; transition: background .15s;
    }
    .btn-e:hover { background: #e2e8f0; }
    .btn-d {
      background: #fef2f2; color: #ef4444; border: none; border-radius: 7px;
      padding: 6px 12px; font-size: 12px; cursor: pointer; transition: background .15s;
    }
    .btn-d:hover { background: #fee2e2; }
    .empty { text-align: center; padding: 40px; color: #94a3b8; font-size: 14px; }

    /* ── 수정 모달 ── */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 100;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #fff; border-radius: 18px; padding: 32px;
      width: 100%; max-width: 500px; box-shadow: 0 24px 64px rgba(0,0,0,.18);
    }
    .modal h3 { font-size: 16px; font-weight: 800; color: #0d2461; margin-bottom: 22px; }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
    .btn-cancel {
      background: #f1f5f9; color: #475569; border: none; border-radius: 9px;
      padding: 11px 22px; font-size: 14px; cursor: pointer;
    }
    .btn-save {
      background: #0d2461; color: #fff; border: none; border-radius: 9px;
      padding: 11px 22px; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .btn-save:hover { background: #2563eb; }

    /* ── 토스트 ── */
    .toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 999;
      background: #0d2461; color: #fff; padding: 13px 22px; border-radius: 10px;
      font-size: 14px; font-weight: 600; box-shadow: 0 8px 32px rgba(0,0,0,.2);
      transform: translateY(80px); opacity: 0; transition: all .3s;
      display: flex; align-items: center; gap: 8px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.err  { background: #ef4444; }

    .tab-bar {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      display: flex; gap: 0; padding: 0 28px;
    }
    .tab-btn {
      background: none; border: none; border-bottom: 3px solid transparent;
      padding: 14px 20px; font-size: 14px; font-weight: 600; color: #94a3b8;
      cursor: pointer; transition: all .15s; margin-bottom: -1px;
    }
    .tab-btn:hover { color: #0d2461; }
    .tab-btn.active { color: #0d2461; border-bottom-color: #0d2461; }

    .btn-setting {
      background: #f1f5f9; color: #1e293b; border: 1px solid #e2e8f0;
      border-radius: 9px; padding: 11px 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-setting:hover { background: #e2e8f0; }
    .btn-setting.btn-danger { background: #fef2f2; color: #ef4444; border-color: #fecaca; }
    .btn-setting.btn-danger:hover { background: #fee2e2; }

    .saving-overlay {
      display: none; position: fixed; inset: 0; background: rgba(255,255,255,.7);
      z-index: 200; align-items: center; justify-content: center; font-size: 16px;
      font-weight: 700; color: #0d2461; gap: 10px;
    }
    .saving-overlay.show { display: flex; }
  </style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">🏢</div>
    <h1>가리봉2구역 재개발조합</h1>
    <p>공지사항 관리자 페이지</p>

    <!-- 일반 로그인 (토큰이 이미 저장된 경우) -->
    <div id="loginNormal">
      <div class="input-group">
        <label>관리자 비밀번호</label>
        <input type="password" id="loginPw" placeholder="비밀번호 입력"
               onkeydown="if(event.key==='Enter') doLogin()"/>
      </div>
      <button class="btn-login" onclick="doLogin()">로그인</button>
      <p style="font-size:11px;color:#94a3b8;margin-top:12px;cursor:pointer;" onclick="showTokenSetup()">
        🔧 처음 설정하거나 토큰을 변경하려면 클릭
      </p>
    </div>

    <!-- 최초 설정 (토큰 입력) -->
    <div id="loginSetup" style="display:none">
      <div class="input-group">
        <label>관리자 비밀번호</label>
        <input type="password" id="setupPw" placeholder="비밀번호 입력"/>
      </div>
      <div class="input-group">
        <label>GitHub 토큰 (최초 1회만 입력)</label>
        <input type="password" id="setupToken" placeholder="gho_... 또는 ghp_..."/>
        <p class="input-hint">이 브라우저에 안전하게 저장됩니다. 이후엔 비밀번호만 입력하면 됩니다.</p>
      </div>
      <button class="btn-login" onclick="doSetup()">설정 완료 및 로그인</button>
      <p style="font-size:11px;color:#94a3b8;margin-top:12px;cursor:pointer;" onclick="showNormalLogin()">
        ← 일반 로그인으로 돌아가기
      </p>
    </div>

    <p class="login-err" id="loginErr"></p>
  </div>
</div>

<!-- 관리자 패널 -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-header">
    <div class="admin-header-left">
      <h1>⚙️ 가리봉2구역 관리자</h1>
    </div>
    <div class="head-right">
      <a href="index.html" target="_blank">← 홈페이지</a>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- 탭 메뉴 -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('notice')">📋 공지사항</button>
    <button class="tab-btn" onclick="switchTab('content')">✏️ 홈페이지 내용</button>
    <button class="tab-btn" onclick="switchTab('setting')">⚙️ 설정</button>
  </div>

  <div class="admin-body">

    <!-- ══ 공지사항 탭 ══ -->
    <div id="tab-notice">
    <!-- 새 공지 등록 -->
    <div class="card">
      <div class="card-title">✏️ 새 공지 등록</div>
      <div class="form-row">
        <div class="field" style="max-width:120px">
          <label>분류</label>
          <select id="nBadge">
            <option value="new">🆕 NEW</option>
            <option value="notice">📢 공지</option>
            <option value="guide">ℹ️ 안내</option>
          </select>
        </div>
        <div class="field">
          <label>제목 *</label>
          <input class="finput" id="nTitle" placeholder="공지 제목"/>
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>부제목 <span style="color:#94a3b8;font-weight:400">(예: 일시 / 장소 등 한 줄 요약)</span></label>
          <input class="finput" id="nSub" placeholder="예) 일시: 2026년 ○월 ○일 / 장소: ○○"/>
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>본문 내용 *</label>
          <textarea class="finput ftextarea" id="nContent" placeholder="공지 본문 내용을 입력하세요. 줄바꿈도 그대로 반영됩니다."></textarea>
        </div>
      </div>
      <button class="btn-submit" id="btnAdd" onclick="addNotice()">등록하기</button>
    </div>

    <!-- 목록 -->
    <div class="card">
      <div class="list-head">
        <div class="card-title" style="margin:0">📋 공지 목록</div>
        <span class="list-count" id="listCount">-</span>
      </div>
      <div id="noticeList"><div class="empty">⏳ 불러오는 중...</div></div>
    </div>
    </div><!-- /tab-notice -->

    <!-- ══ 홈페이지 내용 탭 ══ -->
    <div id="tab-content" style="display:none">
    <div class="card">
      <div class="card-title">🏠 히어로 섹션</div>
      <div class="form-row"><div class="field"><label>태그라인</label><input class="finput" id="ct-hero-tag"/></div></div>
      <div class="form-row">
        <div class="field"><label>제목 1줄</label><input class="finput" id="ct-hero-title1"/></div>
        <div class="field"><label>제목 강조(파란색)</label><input class="finput" id="ct-hero-title2"/></div>
      </div>
      <div class="form-row"><div class="field"><label>설명 (줄바꿈: \n)</label><input class="finput" id="ct-hero-desc"/></div></div>
      <div class="form-row">
        <div class="field"><label>조합원 수 (숫자)</label><input class="finput" id="ct-badge-members"/></div>
        <div class="field"><label>진행단계</label><input class="finput" id="ct-badge-stage"/></div>
        <div class="field"><label>총세대수 (숫자,콤마)</label><input class="finput" id="ct-badge-units"/></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🏢 조합 소개</div>
      <div class="form-row"><div class="field"><label>구역 소개 문구</label><textarea class="finput ftextarea" id="ct-about-intro" style="min-height:80px"></textarea></div></div>
      <div class="form-row">
        <div class="field"><label>조합명 (줄바꿈: \n)</label><input class="finput" id="ct-about-name"/></div>
        <div class="field"><label>위치 (줄바꿈: \n)</label><input class="finput" id="ct-about-location"/></div>
      </div>
      <div class="form-row">
        <div class="field"><label>조합 설립일</label><input class="finput" id="ct-about-founded"/></div>
        <div class="field"><label>조합원 수</label><input class="finput" id="ct-about-members"/></div>
        <div class="field"><label>구역 면적</label><input class="finput" id="ct-about-area"/></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">👤 조합장 인사말</div>
      <div class="form-row">
        <div class="field"><label>조합장 이름</label><input class="finput" id="ct-greeting-chairman"/></div>
        <div class="field"><label>소속</label><input class="finput" id="ct-greeting-position"/></div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>조합장 사진</label>
          <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
            <img id="ct-greeting-photo-preview" src="chairman.png" alt="조합장 사진 미리보기"
                 style="width:84px; height:84px; border-radius:50%; object-fit:cover; object-position:65% 15%; border:2px solid #e0e4eb; background:#f5f7fa;"/>
            <div>
              <input type="file" id="ct-greeting-photo-file" accept="image/png,image/jpeg" style="display:none" onchange="uploadChairmanPhoto(event)"/>
              <button type="button" class="btn-small" onclick="document.getElementById('ct-greeting-photo-file').click()">📷 사진 변경</button>
              <div id="ct-greeting-photo-status" style="font-size:12px; color:#888; margin-top:6px;">PNG 또는 JPG · 정사각형 권장</div>
            </div>
          </div>
          <input type="hidden" id="ct-greeting-photo"/>
        </div>
      </div>
      <div class="form-row"><div class="field"><label>인사말 1단락</label><input class="finput" id="ct-greeting-p1"/></div></div>
      <div class="form-row"><div class="field"><label>인사말 2단락</label><textarea class="finput ftextarea" id="ct-greeting-p2" style="min-height:80px"></textarea></div></div>
      <div class="form-row"><div class="field"><label>인사말 3단락</label><textarea class="finput ftextarea" id="ct-greeting-p3" style="min-height:80px"></textarea></div></div>
      <div class="form-row"><div class="field"><label>인사말 4단락</label><textarea class="finput ftextarea" id="ct-greeting-p4" style="min-height:80px"></textarea></div></div>
      <div class="form-row"><div class="field"><label>인사말 5단락 (마무리)</label><input class="finput" id="ct-greeting-p5"/></div></div>
    </div>

    <div class="card">
      <div class="card-title">📞 문의 / 연락처</div>
      <div class="form-row">
        <div class="field"><label>대표전화</label><input class="finput" id="ct-contact-phone"/></div>
        <div class="field"><label>운영시간</label><input class="finput" id="ct-contact-hours"/></div>
      </div>
      <div class="form-row">
        <div class="field"><label>이메일</label><input class="finput" id="ct-contact-email"/></div>
        <div class="field"><label>사무소 주소 (짧게)</label><input class="finput" id="ct-contact-address"/></div>
        <div class="field"><label>사무소 주소 (전체)</label><input class="finput" id="ct-contact-address-full"/></div>
      </div>
    </div>

    <div style="text-align:right; margin-bottom:32px;">
      <button class="btn-submit" onclick="saveContent()">💾 전체 저장하기</button>
    </div>
    </div><!-- /tab-content -->

    <!-- ══ 설정 탭 ══ -->
    <div id="tab-setting" style="display:none">
    <div class="card">
      <div class="card-title">⚙️ 관리자 설정</div>
      <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <button class="btn-setting" onclick="openPwModal()">🔑 비밀번호 변경</button>
        <button class="btn-setting btn-danger" onclick="resetToken()">🔄 GitHub 토큰 재설정</button>
      </div>
    </div>
    </div><!-- /tab-setting -->
  </div>
</div>

<!-- 수정 모달 -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3>✏️ 공지 수정</h3>
    <input type="hidden" id="eIdx"/>
    <div class="form-row">
      <div class="field" style="max-width:120px">
        <label>분류</label>
        <select id="eBadge">
          <option value="new">🆕 NEW</option>
          <option value="notice">📢 공지</option>
          <option value="guide">ℹ️ 안내</option>
        </select>
      </div>
      <div class="field">
        <label>제목</label>
        <input class="finput" id="eTitle"/>
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>부제목</label>
        <input class="finput" id="eSub"/>
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>본문 내용 *</label>
        <textarea class="finput ftextarea" id="eContent"></textarea>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save"   onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<!-- 비밀번호 변경 모달 -->
<div class="modal-bg" id="pwModal">
  <div class="modal">
    <h3>🔑 비밀번호 변경</h3>
    <div class="form-row">
      <div class="field">
        <label>현재 비밀번호</label>
        <input class="finput" type="password" id="pwCurrent" placeholder="현재 비밀번호"/>
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>새 비밀번호</label>
        <input class="finput" type="password" id="pwNew" placeholder="새 비밀번호 (6자 이상)"/>
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>새 비밀번호 확인</label>
        <input class="finput" type="password" id="pwConfirm" placeholder="새 비밀번호 다시 입력"/>
      </div>
    </div>
    <p style="font-size:12px;color:#94a3b8;margin-top:4px;">변경된 비밀번호는 이 브라우저에 저장됩니다.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closePwModal()">취소</button>
      <button class="btn-save"   onclick="changePw()">변경하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="saving-overlay" id="savingOverlay">⏳ 저장 중...</div>

<script>
  // ── 설정 ───────────────────────────────────────────
  const REPO         = 'duelspost-droid/garibong2-site';
  const FILE         = 'notices.json';
  const CONTENT_FILE = 'content.json';
  const GH_API = `https://api.github.com/repos/${REPO}/contents/${FILE}`;
  const DEFAULT_PW = 'garibong2024!';
  // 비밀번호: localStorage에 저장된 값 우선, 없으면 기본값
  function getAdminPw() { return localStorage.getItem('admin_pw') || DEFAULT_PW; }
  // ───────────────────────────────────────────────────

  const badgeLabel = { new:'NEW', notice:'공지', guide:'안내' };
  const badgeClass = { new:'b-new', notice:'b-notice', guide:'b-guide' };

  let notices = [];
  let fileSha = '';

  // ── 보안 상수 ─────────────────────────────────────
  const MAX_ATTEMPTS  = 5;      // 최대 로그인 시도 횟수
  const LOCK_MINUTES  = 15;     // 잠금 시간 (분)
  const SESSION_HOURS = 2;      // 세션 유효 시간 (시간)

  // ── 인증 헬퍼 ─────────────────────────────────────
  function isLoggedIn() {
    if (sessionStorage.getItem('admin_auth') !== '1') return false;
    // 세션 타임아웃 체크
    const loginTime = parseInt(sessionStorage.getItem('login_time') || '0');
    if (Date.now() - loginTime > SESSION_HOURS * 3600 * 1000) {
      sessionStorage.clear();
      return false;
    }
    return true;
  }
  function getSavedToken() { return localStorage.getItem('gh_token_enc') || ''; }
  function hasToken()       { return !!getSavedToken(); }

  // ── 로그인 시도 제한 ──────────────────────────────
  function getAttempts()  { return parseInt(localStorage.getItem('login_attempts') || '0'); }
  function getLockUntil() { return parseInt(localStorage.getItem('lock_until') || '0'); }
  function isLocked()     { return Date.now() < getLockUntil(); }
  function recordFail() {
    const cnt = getAttempts() + 1;
    localStorage.setItem('login_attempts', cnt);
    if (cnt >= MAX_ATTEMPTS) {
      const until = Date.now() + LOCK_MINUTES * 60 * 1000;
      localStorage.setItem('lock_until', until);
      localStorage.setItem('login_attempts', '0');
    }
  }
  function clearFail() {
    localStorage.removeItem('login_attempts');
    localStorage.removeItem('lock_until');
  }
  function lockMsg() {
    const rem = Math.ceil((getLockUntil() - Date.now()) / 60000);
    return `비밀번호 오류가 ${MAX_ATTEMPTS}회 초과되어 ${rem}분간 잠겼습니다.`;
  }

  // ── 화면 전환 ─────────────────────────────────────
  window.showTokenSetup  = () => {
    document.getElementById('loginNormal').style.display = 'none';
    document.getElementById('loginSetup').style.display  = 'block';
    document.getElementById('loginErr').textContent = '';
  };
  window.showNormalLogin = () => {
    document.getElementById('loginNormal').style.display = 'block';
    document.getElementById('loginSetup').style.display  = 'none';
    document.getElementById('loginErr').textContent = '';
  };
  if (!hasToken()) showTokenSetup();

  // ── 일반 로그인 (비밀번호만) ──────────────────────
  window.doLogin = () => {
    const err = document.getElementById('loginErr');
    if (isLocked()) { err.textContent = lockMsg(); return; }
    const pw = document.getElementById('loginPw').value;
    if (pw !== getAdminPw()) {
      recordFail();
      const cnt = getAttempts();
      const rem = MAX_ATTEMPTS - cnt;
      err.textContent = rem > 0
        ? `비밀번호가 틀렸습니다. (${rem}회 남음)`
        : lockMsg();
      return;
    }
    if (!getSavedToken()) {
      err.textContent = '먼저 GitHub 토큰 설정이 필요합니다.';
      showTokenSetup(); return;
    }
    clearFail();
    sessionStorage.setItem('admin_auth', '1');
    sessionStorage.setItem('login_time', Date.now());
    sessionStorage.setItem('gh_token', atob(getSavedToken()));
    showAdmin();
  };

  // ── 최초 설정 (비밀번호 + 토큰) ──────────────────
  window.doSetup = () => {
    const err   = document.getElementById('loginErr');
    if (isLocked()) { err.textContent = lockMsg(); return; }
    const pw    = document.getElementById('setupPw').value;
    const token = document.getElementById('setupToken').value.trim();
    if (pw !== getAdminPw()) {
      recordFail();
      err.textContent = '비밀번호가 틀렸습니다.'; return;
    }
    if (!token) { err.textContent = 'GitHub 토큰을 입력해주세요.'; return; }
    clearFail();
    localStorage.setItem('gh_token_enc', btoa(token));
    sessionStorage.setItem('admin_auth', '1');
    sessionStorage.setItem('login_time', Date.now());
    sessionStorage.setItem('gh_token', token);
    showAdmin();
  };

  window.doLogout = () => {
    sessionStorage.clear();
    location.reload();
  };

  function showAdmin() {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    loadNotices();
    startSessionTimer();
  }

  if (isLoggedIn()) showAdmin();
  else { sessionStorage.clear(); }

  // ── 세션 타이머 (자동 로그아웃) ──────────────────
  function startSessionTimer() {
    setInterval(() => {
      if (!isLoggedIn()) {
        showToast('세션이 만료되었습니다. 다시 로그인해주세요.', true);
        setTimeout(() => { sessionStorage.clear(); location.reload(); }, 2000);
      }
    }, 60000); // 1분마다 체크
  }

  // ── GitHub API ────────────────────────────────────
  // 매 요청 시 세션에서 토큰을 읽어 사용
  function ghHeaders() {
    return {
      'Authorization': `Bearer ${sessionStorage.getItem('gh_token')}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    };
  }

  // base64 → UTF-8 한글 올바르게 디코딩
  function b64toUtf8(str) {
    return decodeURIComponent(
      atob(str.replace(/\n/g, ''))
        .split('').map(c => '%' + c.charCodeAt(0).toString(16).padStart(2,'0')).join('')
    );
  }

  async function loadNotices() {
    try {
      const res  = await fetch(GH_API, { headers: ghHeaders() });
      const data = await res.json();
      fileSha  = data.sha;
      notices  = JSON.parse(b64toUtf8(data.content));
      renderList();
    } catch(e) {
      showToast('불러오기 실패: ' + e.message, true);
    }
  }

  async function saveNotices(msg) {
    document.getElementById('savingOverlay').classList.add('show');
    try {
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(notices, null, 2))));
      const res = await fetch(GH_API, {
        method: 'PUT',
        headers: ghHeaders(),
        body: JSON.stringify({ message: msg, content, sha: fileSha })
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      fileSha = data.content.sha;
    } catch(e) {
      showToast('저장 실패: ' + e.message, true);
    } finally {
      document.getElementById('savingOverlay').classList.remove('show');
    }
  }

  // ── 렌더링 ────────────────────────────────────────
  function renderList() {
    const list = document.getElementById('noticeList');
    document.getElementById('listCount').textContent = notices.length + '건';
    if (!notices.length) { list.innerHTML = '<div class="empty">등록된 공지가 없습니다.</div>'; return; }
    list.innerHTML = notices.map((n, i) => `
      <div class="notice-item">
        <span class="nbadge ${badgeClass[n.badge]||'b-notice'}">${badgeLabel[n.badge]||n.badge}</span>
        <div class="notice-body">
          <strong>${n.title}</strong>
          <small>${n.date||''}</small>
          ${n.sub ? `<p class="sub-text">${n.sub}</p>` : ''}
          ${n.content ? `<p class="content-preview">${n.content.replace(/\n/g,'<br>').slice(0,80)}${n.content.length>80?'…':''}</p>` : '<p class="content-missing">⚠️ 본문 없음</p>'}
        </div>
        <div class="item-actions">
          <button class="btn-e" onclick="openEdit(${i})">수정</button>
          <button class="btn-d" onclick="delNotice(${i})">삭제</button>
        </div>
      </div>`).join('');
  }

  // ── CRUD ──────────────────────────────────────────
  window.addNotice = async () => {
    const title   = document.getElementById('nTitle').value.trim();
    const content = document.getElementById('nContent').value.trim();
    if (!title)   { showToast('제목을 입력해주세요', true); return; }
    if (!content) { showToast('본문 내용을 입력해주세요', true); return; }
    const btn = document.getElementById('btnAdd');
    btn.disabled = true; btn.textContent = '등록 중...';
    const today = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'})
      .replace(/\. /g,'.').slice(0,-1);
    notices.unshift({
      id: Date.now(),
      badge:   document.getElementById('nBadge').value,
      title,
      sub:     document.getElementById('nSub').value.trim(),
      content,
      date:    today
    });
    await saveNotices('공지 추가: ' + title);
    document.getElementById('nTitle').value   = '';
    document.getElementById('nSub').value     = '';
    document.getElementById('nContent').value = '';
    renderList();
    showToast('✅ 공지가 등록되었습니다');
    btn.disabled = false; btn.textContent = '등록하기';
  };

  window.delNotice = async (i) => {
    if (!confirm(`"${notices[i].title}" 을 삭제할까요?`)) return;
    const title = notices[i].title;
    notices.splice(i, 1);
    await saveNotices('공지 삭제: ' + title);
    renderList();
    showToast('🗑️ 삭제되었습니다');
  };

  window.openEdit = (i) => {
    document.getElementById('eIdx').value     = i;
    document.getElementById('eBadge').value   = notices[i].badge;
    document.getElementById('eTitle').value   = notices[i].title;
    document.getElementById('eSub').value     = notices[i].sub || '';
    document.getElementById('eContent').value = notices[i].content || '';
    document.getElementById('editModal').classList.add('open');
  };
  window.closeModal = () => document.getElementById('editModal').classList.remove('open');
  window.saveEdit   = async () => {
    const i       = parseInt(document.getElementById('eIdx').value);
    const title   = document.getElementById('eTitle').value.trim();
    const content = document.getElementById('eContent').value.trim();
    if (!title)   { showToast('제목을 입력해주세요', true); return; }
    if (!content) { showToast('본문 내용을 입력해주세요', true); return; }
    notices[i].badge   = document.getElementById('eBadge').value;
    notices[i].title   = title;
    notices[i].sub     = document.getElementById('eSub').value.trim();
    notices[i].content = content;
    await saveNotices('공지 수정: ' + title);
    closeModal(); renderList();
    showToast('✅ 수정되었습니다');
  };

  // ── 탭 전환 ──────────────────────────────────────
  window.switchTab = (tab) => {
    ['notice','content','setting'].forEach(t => {
      document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
    });
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', ['notice','content','setting'][i] === tab);
    });
    if (tab === 'content') loadContent();
  };

  // ── content.json 로드 ─────────────────────────────
  let contentSha = '';
  async function loadContent() {
    try {
      const res  = await fetch(`https://api.github.com/repos/${REPO}/contents/${CONTENT_FILE}`, { headers: ghHeaders() });
      const data = await res.json();
      contentSha = data.sha;
      const c = JSON.parse(b64toUtf8(data.content));
      // 히어로
      v('ct-hero-tag',     c.hero?.tag);
      v('ct-hero-title1',  c.hero?.title1);
      v('ct-hero-title2',  c.hero?.title2);
      v('ct-hero-desc',    c.hero?.desc);
      v('ct-badge-members',c.hero?.badge_members);
      v('ct-badge-stage',  c.hero?.badge_stage);
      v('ct-badge-units',  c.hero?.badge_units);
      // 조합 소개
      v('ct-about-intro',   c.about?.intro);
      v('ct-about-name',    c.about?.name);
      v('ct-about-location',c.about?.location);
      v('ct-about-founded', c.about?.founded);
      v('ct-about-members', c.about?.members);
      v('ct-about-area',    c.about?.area);
      // 인사말
      v('ct-greeting-chairman', c.greeting?.chairman);
      v('ct-greeting-position', c.greeting?.position);
      v('ct-greeting-p1', c.greeting?.p1);
      v('ct-greeting-p2', c.greeting?.p2);
      v('ct-greeting-p3', c.greeting?.p3);
      v('ct-greeting-p4', c.greeting?.p4);
      v('ct-greeting-p5', c.greeting?.p5);
      // 조합장 사진
      const photoVal = c.greeting?.photo || 'chairman.png';
      v('ct-greeting-photo', photoVal);
      const prev = document.getElementById('ct-greeting-photo-preview');
      if (prev) prev.src = photoVal + (photoVal.includes('?') ? '' : '?t=' + Date.now());
      // 문의
      v('ct-contact-phone',       c.contact?.phone);
      v('ct-contact-hours',       c.contact?.hours);
      v('ct-contact-email',       c.contact?.email);
      v('ct-contact-address',     c.contact?.address);
      v('ct-contact-address-full',c.contact?.address_full);
    } catch(e) { showToast('콘텐츠 불러오기 실패: ' + e.message, true); }
  }
  function v(id, val) { const el = document.getElementById(id); if (el && val !== undefined) el.value = val; }

  // ── content.json 저장 ─────────────────────────────
  window.saveContent = async () => {
    const c = {
      hero: {
        tag: g('ct-hero-tag'), title1: g('ct-hero-title1'), title2: g('ct-hero-title2'),
        desc: g('ct-hero-desc'), badge_members: g('ct-badge-members'),
        badge_stage: g('ct-badge-stage'), badge_units: g('ct-badge-units')
      },
      about: {
        intro: g('ct-about-intro'), name: g('ct-about-name'), location: g('ct-about-location'),
        founded: g('ct-about-founded'), members: g('ct-about-members'), area: g('ct-about-area')
      },
      greeting: {
        chairman: g('ct-greeting-chairman'), position: g('ct-greeting-position'),
        p1: g('ct-greeting-p1'), p2: g('ct-greeting-p2'), p3: g('ct-greeting-p3'),
        p4: g('ct-greeting-p4'), p5: g('ct-greeting-p5'),
        photo: g('ct-greeting-photo') || 'chairman.png'
      },
      contact: {
        phone: g('ct-contact-phone'), hours: g('ct-contact-hours'),
        email: g('ct-contact-email'), address: g('ct-contact-address'),
        address_full: g('ct-contact-address-full')
      },
      footer: {
        address: g('ct-contact-address-full'),
        phone: g('ct-contact-phone'),
        email: g('ct-contact-email')
      }
    };
    document.getElementById('savingOverlay').classList.add('show');
    try {
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(c, null, 2))));
      const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${CONTENT_FILE}`, {
        method: 'PUT', headers: ghHeaders(),
        body: JSON.stringify({ message: '홈페이지 콘텐츠 수정', content, sha: contentSha })
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      contentSha = data.content.sha;
      showToast('✅ 홈페이지 내용이 저장되었습니다');
    } catch(e) { showToast('저장 실패: ' + e.message, true); }
    document.getElementById('savingOverlay').classList.remove('show');
  };
  function g(id) { const el = document.getElementById(id); return el ? el.value : ''; }

  // ── 조합장 사진 업로드 ─────────────────────────────
  window.uploadChairmanPhoto = async (ev) => {
    const file = ev.target.files && ev.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast('이미지는 5MB 이하여야 합니다', true); ev.target.value=''; return; }

    const statusEl = document.getElementById('ct-greeting-photo-status');
    statusEl.textContent = '업로드 중...';
    document.getElementById('savingOverlay').classList.add('show');
    try {
      // 파일 → base64
      const b64 = await new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload  = () => resolve(r.result.split(',')[1]);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
      const ext  = (file.type === 'image/jpeg') ? 'jpg' : 'png';
      const fname = `chairman_${Date.now()}.${ext}`;
      const apiUrl = `https://api.github.com/repos/${REPO}/contents/${fname}`;
      const res = await fetch(apiUrl, {
        method: 'PUT', headers: ghHeaders(),
        body: JSON.stringify({ message: '조합장 사진 업로드', content: b64 })
      });
      if (!res.ok) throw new Error(await res.text());
      // 미리보기 + 숨김필드 갱신
      document.getElementById('ct-greeting-photo').value = fname;
      const dataUrl = `data:${file.type};base64,${b64}`;
      document.getElementById('ct-greeting-photo-preview').src = dataUrl;
      statusEl.innerHTML = '✅ 업로드 완료 — <strong>저장 버튼</strong>을 눌러 반영하세요';
      showToast('✅ 사진이 업로드되었습니다. 저장 버튼을 눌러주세요');
    } catch(e) {
      statusEl.textContent = 'PNG 또는 JPG · 정사각형 권장';
      showToast('사진 업로드 실패: ' + e.message, true);
    }
    document.getElementById('savingOverlay').classList.remove('show');
    ev.target.value = '';
  };

  // ── 비밀번호 변경 ─────────────────────────────────
  window.openPwModal  = () => {
    document.getElementById('pwCurrent').value = '';
    document.getElementById('pwNew').value     = '';
    document.getElementById('pwConfirm').value = '';
    document.getElementById('pwModal').classList.add('open');
  };
  window.closePwModal = () => document.getElementById('pwModal').classList.remove('open');
  window.changePw     = () => {
    const cur     = document.getElementById('pwCurrent').value;
    const nw      = document.getElementById('pwNew').value;
    const confirm = document.getElementById('pwConfirm').value;
    if (cur !== getAdminPw()) { showToast('현재 비밀번호가 틀렸습니다', true); return; }
    if (nw.length < 6)        { showToast('새 비밀번호는 6자 이상이어야 합니다', true); return; }
    if (nw !== confirm)       { showToast('새 비밀번호가 일치하지 않습니다', true); return; }
    localStorage.setItem('admin_pw', nw);
    closePwModal();
    showToast('✅ 비밀번호가 변경되었습니다');
  };

  // ── GitHub 토큰 재설정 ────────────────────────────
  window.resetToken = () => {
    if (!confirm('GitHub 토큰을 재설정하면 다음 로그인 시 토큰을 다시 입력해야 합니다. 계속할까요?')) return;
    localStorage.removeItem('gh_token_enc');
    sessionStorage.clear();
    showToast('🔄 토큰이 삭제되었습니다. 다시 로그인해주세요');
    setTimeout(() => location.reload(), 1500);
  };

  // ── 토스트 ────────────────────────────────────────
  function showToast(msg, err=false) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show' + (err?' err':'');
    setTimeout(() => t.className = 'toast', 3000);
  }
</script>
</body>
</html>
