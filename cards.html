<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>명함 시안 — 가리봉2구역재개발정비사업조합</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #ffffff;
      padding: 50px 40px;
    }
    .brand { font-family: 'Jua', sans-serif; }

    h1.page-title {
      font-size: 34px; font-weight: 900; color: #111;
      margin-bottom: 36px; letter-spacing: 10px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
      max-width: 1000px;
    }

    .card {
      background: #fff;
      border: 1px solid #888;
      width: 100%;
      aspect-ratio: 9 / 5;
      position: relative;
      padding: 26px 30px;
      display: flex;
      flex-direction: column;
    }

    /* 상단 조합명 — 우리 Jua 레터마크 */
    .card-title {
      font-size: 33px;
      color: #1a2a6c;
      letter-spacing: 0.1px;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
    }

    /* ===== 뒷면 ===== */
    .card.back {
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card.back .sig-img {
      width: 100%;
      height: auto;
    }

    /* 본문 */
    .card-body {
      flex: 1;
      position: relative;
      margin-top: 18px;
    }

    /* 좌하단 건물 라인아트 (원본 그대로) */
    .skyline {
      position: absolute;
      left: 0; bottom: 0;
      width: 52%;
      height: auto;
    }

    /* 우측 인물 정보 */
    .person {
      position: absolute;
      right: 0; bottom: 10px;
      width: 50%;
    }
    .person .role-name {
      display: flex; align-items: baseline; gap: 9px; margin-bottom: 12px;
    }
    .person .role { font-size: 13px; color: #333; }
    .person .name {
      font-size: 26px; font-weight: 900; color: #111; letter-spacing: 6px;
    }
    .person .contact p {
      font-size: 13px; color: #222; letter-spacing: 0.2px;
      margin: 5px 0; display: flex; align-items: center;
    }
    .person .contact .label {
      color: #1a2a6c; font-weight: 700; font-size: 14px;
      margin-right: 9px; min-width: 11px;
    }

    @media print {
      body { background: white; padding: 8mm; }
      h1.page-title { display: none; }
      .cards-grid { grid-template-columns: repeat(2, 90mm); gap: 6mm; }
      .card { width: 90mm; height: 50mm; aspect-ratio: unset; page-break-inside: avoid; border: 1px solid #999; }
      .card.back { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<h1 class="page-title" style="margin-top:56px;">뒷 면</h1>

</body>
</html>
